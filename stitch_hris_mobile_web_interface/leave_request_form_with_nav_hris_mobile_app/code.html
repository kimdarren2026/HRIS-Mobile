<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Request Leave - HRIS Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#dce2f3",
                        "primary-container": "#4f46e5",
                        "outline-variant": "#c7c4d8",
                        "primary": "#3525cd",
                        "outline": "#777587",
                        "secondary-container": "#6860ef",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "primary-fixed-dim": "#c3c0ff",
                        "warning": "#F59E0B",
                        "on-surface": "#151c27",
                        "on-secondary-container": "#fffbff",
                        "surface-bright": "#f9f9ff",
                        "surface-tint": "#4d44e3",
                        "inverse-on-surface": "#ebf1ff",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-primary-fixed-variant": "#3323cc",
                        "background": "#f9f9ff",
                        "inverse-surface": "#2a313d",
                        "tertiary": "#7e3000",
                        "on-background": "#151c27",
                        "secondary": "#4e45d5",
                        "error": "#ba1a1a",
                        "surface-container": "#e7eefe",
                        "on-surface-variant": "#464555",
                        "tertiary-container": "#a44100",
                        "surface-container-high": "#e2e8f8",
                        "surface": "#F9FAFB",
                        "inverse-primary": "#c3c0ff",
                        "on-tertiary-fixed": "#351000",
                        "on-secondary-fixed": "#100069",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#e3dfff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#0f0069",
                        "on-error": "#ffffff",
                        "success": "#10B981",
                        "primary-fixed": "#e2dfff",
                        "surface-dim": "#d3daea",
                        "on-secondary-fixed-variant": "#372abf",
                        "border": "#E5E7EB",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#dad7ff",
                        "tertiary-fixed": "#ffdbcc",
                        "secondary-fixed-dim": "#c3c0ff",
                        "surface-container-low": "#f0f3ff",
                        "danger": "#EF4444",
                        "on-tertiary-container": "#ffd2be",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dce2f3",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "16px",
                        "unit-xs": "4px",
                        "unit-md": "16px",
                        "unit-lg": "24px",
                        "unit-xl": "32px",
                        "unit-sm": "8px",
                        "card-gap": "12px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "status-badge": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "status-badge": ["12px", { "lineHeight": "12px", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen max-w-[390px] mx-auto overflow-x-hidden md:max-w-full pb-40">
<!-- TopAppBar Semantic Shell: linear transactional flow so no BottomNavBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-container-margin h-16 bg-surface-container-lowest shadow-sm border-b border-outline-variant">
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-container-low active:opacity-70 transition-opacity rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Request Leave</h1>
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-container-low active:opacity-70 transition-opacity rounded-full">
<span class="material-symbols-outlined">info</span>
</button>
</header>
<main class="pt-20 px-container-margin flex flex-col gap-unit-lg">
<!-- Remaining Balance Card -->
<section class="bg-primary-container text-on-primary-container p-unit-md rounded-xl shadow-sm flex flex-col gap-unit-sm">
<h2 class="text-label-md font-label-md uppercase tracking-wider opacity-90">Annual Leave Status</h2>
<div class="flex items-center gap-unit-sm">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">event_available</span>
<p class="text-headline-lg font-headline-lg font-bold">Remaining Balance: 12 Days</p>
</div>
</section>
<!-- Form Fields -->
<form class="flex flex-col gap-unit-md bg-surface-container-lowest p-unit-md rounded-xl shadow-sm border border-border">
<div class="flex flex-col gap-unit-xs">
<label class="text-label-md font-label-md text-on-surface-variant" for="leave_type">Leave Type</label>
<div class="relative">
<select class="w-full h-12 px-unit-md bg-surface border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface appearance-none focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent" id="leave_type">
<option value="annual">Annual Leave</option>
<option value="sick">Sick Leave</option>
<option value="personal">Personal Leave</option>
<option value="special">Special Leave</option>
</select>
<span class="material-symbols-outlined absolute right-unit-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">arrow_drop_down</span>
</div>
</div>
<div class="flex gap-unit-md">
<div class="flex flex-col gap-unit-xs w-1/2">
<label class="text-label-md font-label-md text-on-surface-variant" for="start_date">Start Date</label>
<div class="relative">
<input class="w-full h-12 px-unit-md bg-surface border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent" id="start_date" type="date">
</div>
</div>
<div class="flex flex-col gap-unit-xs w-1/2">
<label class="text-label-md font-label-md text-on-surface-variant" for="end_date">End Date</label>
<div class="relative">
<input class="w-full h-12 px-unit-md bg-surface border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent" id="end_date" type="date">
</div>
</div>
</div>
<div class="flex flex-col gap-unit-xs">
<label class="text-label-md font-label-md text-on-surface-variant" for="reason">Reason</label>
<textarea class="w-full p-unit-md bg-surface border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent resize-none" id="reason" placeholder="Provide a brief reason for your leave..." rows="4"></textarea>
</div>
<div class="flex flex-col gap-unit-xs">
<label class="text-label-md font-label-md text-on-surface-variant">Attachments (Optional)</label>
<div class="border-2 border-dashed border-outline-variant rounded-lg p-unit-md flex flex-col items-center justify-center gap-unit-sm bg-surface hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-outline text-[32px]">upload_file</span>
<p class="text-body-md font-body-md text-on-surface-variant text-center">Tap to upload<br><span class="text-label-sm font-label-sm text-outline">PDF, JPG, or PNG up to 5MB</span></p>
<input accept=".pdf,.jpg,.jpeg,.png" class="hidden" type="file">
</div>
</div>
</form>
<p class="text-label-sm font-label-sm text-on-surface-variant text-center px-unit-md">
            Leave balance will be deducted only after HR approval.
        </p>
<button class="w-full h-12 bg-primary-container text-on-primary-container rounded-lg text-body-lg font-body-lg font-semibold shadow-sm hover:bg-secondary-container active:scale-95 transition-all flex items-center justify-center gap-unit-sm" type="button">
<span>Submit Request</span>
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</main>
<!-- BottomNavBar Suppression Rule: Task-Focused transactional page (implies temporary departure from main flow, contains back action). Navigation shell suppressed. -->
<nav class="fixed bottom-0 left-0 right-0 mx-auto max-w-[390px] md:max-w-full h-16 bg-surface-container-lowest border-t border-outline-variant flex items-center justify-around px-unit-sm z-50">
<a class="flex flex-col items-center gap-unit-xs text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center gap-unit-xs text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">schedule</span>
<span class="text-label-sm">Attendance</span>
</a>
<a class="flex flex-col items-center gap-unit-xs text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">event_note</span>
<span class="text-label-sm font-bold">Leave</span>
</a>
<a class="flex flex-col items-center gap-unit-xs text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="text-label-sm">Payslip</span>
</a>
<a class="flex flex-col items-center gap-unit-xs text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-label-sm">Profile</span>
</a>
</nav></body></html>
